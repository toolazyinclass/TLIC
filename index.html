<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>too lazy, in class</title>
<meta name="description" content="an artist page... make that an excellent artist page...">

<link rel="icon" href="beach.gif">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  width: 100vw;
  background: url("beach.gif") no-repeat center center fixed;
  background-size: cover;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CD */
#cd {
  width: 220px;
  max-width: 60vw;
  cursor: pointer;
  transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
  animation: float 4s ease-in-out infinite;
}

/* FLOAT */
@keyframes float {
  0%   { transform: translateY(0px) rotate(0deg); }
  50%  { transform: translateY(-18px) rotate(1deg); }
  100% { transform: translateY(0px) rotate(0deg); }
}

/* HOVER */
@media (hover: hover) {
  #cd:hover {
    animation: shake 0.08s infinite;
    transform: scale(1.28);
  }
}

/* MOBILE */
#cd:active {
  animation: shake 0.08s infinite;
  transform: scale(1.2);
}

/* SHAKE */
@keyframes shake {
  0%   { transform: translate(0px, 0px) rotate(0deg) scale(1.28); }
  25%  { transform: translate(2px, -2px) rotate(1deg) scale(1.28); }
  50%  { transform: translate(-2px, 2px) rotate(-1deg) scale(1.28); }
  75%  { transform: translate(2px, 2px) rotate(1deg) scale(1.28); }
  100% { transform: translate(-2px, -2px) rotate(-1deg) scale(1.28); }
}

/* Mobile sizing */
@media (max-width: 600px) {
  #cd {
    width: 180px;
  }
}
</style>
</head>

<body>

<img id="cd" src="cd.gif" alt="CD Button">
<audio id="bgAudio" src="beach.wav" loop></audio>

<script>
const cd = document.getElementById("cd");
const audio = document.getElementById("bgAudio");

// Redirect
cd.addEventListener("click", () => {
  window.location.href = "#";
});

// Start audio (required for mobile)
document.addEventListener("click", () => {
  audio.play();
  scheduleGlitch();
}, { once: true });

/* AUDIO GLITCH (low pitch + stutter, no visual) */
function glitchAudio() {
  if (audio.paused) return;

  const baseTime = audio.currentTime;

  // low pitch
  audio.playbackRate = 0.6;

  let repeats = 15;
  let count = 0;

  const stutter = setInterval(() => {
    audio.currentTime = baseTime + (Math.random() * 0.02);
    count++;
    if (count >= repeats) {
      clearInterval(stutter);
    }
  }, 70);

  setTimeout(() => {
    audio.playbackRate = 1;
  }, 1400);
}

/* Random 30–60 sec loop */
function scheduleGlitch() {
  let time = Math.random() * (60000 - 30000) + 30000;

  setTimeout(() => {
    glitchAudio();
    scheduleGlitch();
  }, time);
}
</script>

</body>
</html>
