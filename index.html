<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>too lazy, in class</title>
<meta name="description" content="an artist page... make that an excellent artist page...">

<link rel="icon" href="beach.gif">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  background: #000;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
}

/* background — oversized to kill mobile white borders */
#bg {
  position: fixed;
  inset: -20px;
  background: url("beach.gif") no-repeat center center;
  background-size: cover;
  z-index: 0;
}

/* cd */
#cd {
  width: 220px;
  max-width: 60vw;
  cursor: pointer;
  position: relative;
  z-index: 1;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%   { transform: translateY(0); }
  50%  { transform: translateY(-18px); }
  100% { transform: translateY(0); }
}

@media (max-width: 600px) {
  #cd { width: 180px; }
}
</style>
</head>

<body>

<div id="bg"></div>
<img id="cd" src="cd.gif" alt="CD">
<audio id="bgAudio" src="beach.wav" loop></audio>

<script>
const cd    = document.getElementById("cd");
const audio = document.getElementById("bgAudio");
const hasHover = window.matchMedia("(hover: hover)").matches;

let isGlitching   = false;
let isHovering     = false;
let hoverProgress  = 0;
let hoverFrame     = null;

/* ── click → link ──────────────────────────── */
cd.addEventListener("click", () => {
  window.location.href = "https://youtu.be/dQw4w9WgXcQ?si=GtJHGgjiBQBm4uSq";
});

/* ── first interaction → audio + glitch loop ─ */
document.addEventListener("click", () => {
  audio.play();
  setInterval(triggerGlitch, 15000);
}, { once: true });

/* ── hover: progressive scale + vibration ──── */
if (hasHover) {
  cd.addEventListener("mouseenter", () => {
    if (isGlitching) return;
    isHovering = true;
    cd.style.animation = "none";
    if (!hoverFrame) runHover();
  });

  cd.addEventListener("mouseleave", () => {
    isHovering = false;
  });
}

function runHover() {
  let prev = performance.now();

  function tick(now) {
    if (isGlitching) {
      hoverProgress = 0;
      hoverFrame = null;
      return;
    }

    const dt = (now - prev) / 1000;
    prev = now;

    hoverProgress = isHovering
      ? Math.min(1, hoverProgress + dt / 2)
      : Math.max(0, hoverProgress - dt / 2);

    if (hoverProgress <= 0 && !isHovering) {
      cd.style.transform = "";
      void cd.offsetHeight;
      cd.style.animation = "float 4s ease-in-out infinite";
      hoverFrame = null;
      return;
    }

    const t = hoverProgress * hoverProgress;

    const scale = 1 + hoverProgress * 0.18;
    const sx = (Math.random() - 0.5) * 12 * t;
    const sy = (Math.random() - 0.5) * 12 * t;
    const sr = (Math.random() - 0.5) * 6  * t;

    cd.style.transform =
      `translate(${sx}px,${sy}px) scale(${scale}) rotate(${sr}deg)`;

    hoverFrame = requestAnimationFrame(tick);
  }

  hoverFrame = requestAnimationFrame(tick);
}

/* ── glitch (for the CD!!!) ────── */
function triggerGlitch() {
  if (audio.paused) return;
  isGlitching = true;

  if (hoverFrame) {
    cancelAnimationFrame(hoverFrame);
    hoverFrame = null;
    hoverProgress = 0;
  }

  const baseTime = audio.currentTime;
  const duration = 1500;

  cd.style.animation = "none";
  audio.playbackRate = 0.6;

  const loop = setInterval(() => {
    const big   = Math.random() > 0.7;
    const range = big ? 160 : 50;
    const x     = (Math.random() - 0.5) * range;
    const y     = (Math.random() - 0.5) * range;

    let scale;
    const r = Math.random();
    if      (r > 0.92) scale = 1.9  + Math.random() * 0.6;
    else if (r > 0.82) scale = 0.25 + Math.random() * 0.25;
    else               scale = 0.75 + Math.random() * 0.5;

    const rot  = (Math.random() - 0.5) * (big ? 30 : 10);
    const skew = Math.random() > 0.8 ? (Math.random() - 0.5) * 20 : 0;

    cd.style.transform =
      `translate(${x}px,${y}px) scale(${scale}) rotate(${rot}deg) skewX(${skew}deg)`;

    audio.currentTime = baseTime + Math.random() * 0.025;
  }, 55);

  setTimeout(() => {
    clearInterval(loop);
    isGlitching = false;

    cd.style.transform = "";
    audio.playbackRate = 1;

    void cd.offsetHeight;
    cd.style.animation = "float 4s ease-in-out infinite";

    if (isHovering && hasHover) {
      hoverProgress = 0;
      cd.style.animation = "none";
      runHover();
    }
  }, duration);
}
</script>

</body>
</html>
