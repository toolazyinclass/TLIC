<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>too lazy, in class</title>
<meta name="description" content="our artist page. taste the waves.">

<link rel="icon" href="beach.gif">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  width: 100vw;
  background: url("beach.gif") no-repeat center center fixed;
  background-size: cover;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Wrapper */
.cd-wrap {
  isolation: isolate;
  position: relative;
}

/* CD */
#cd {
  width: 220px;
  max-width: 60vw;
  cursor: pointer;
  transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
  background: transparent;
  animation: float 4s ease-in-out infinite;
}

/* Floating */
@keyframes float {
  0%   { transform: translateY(0px) rotate(0deg); }
  50%  { transform: translateY(-10px) rotate(1deg); }
  100% { transform: translateY(0px) rotate(0deg); }
}

/* Hover */
@media (hover: hover) {
  #cd:hover {
    transform: scale(1.28);
    animation: shake 0.05s infinite;
  }
}

/* Mobile tap */
#cd:active {
  transform: scale(1.2);
  animation: shake 0.05s infinite;
}

/* Shake */
@keyframes shake {
  0%   { transform: translate(0px, 0px) rotate(0deg) scale(1.28); }
  25%  { transform: translate(2px, -2px) rotate(1deg) scale(1.28); }
  50%  { transform: translate(-2px, 2px) rotate(-1deg) scale(1.28); }
  75%  { transform: translate(2px, 2px) rotate(1deg) scale(1.28); }
  100% { transform: translate(-2px, -2px) rotate(-1deg) scale(1.28); }
}

/* CHAOS GLITCH */
.glitching {
  animation: chaos 0.08s steps(2) infinite !important;
}

@keyframes chaos {
  0%   { transform: translate(0,0) scale(1.2); }
  20%  { transform: translate(40vw, -30vh) scale(1.3) rotate(20deg); }
  40%  { transform: translate(-45vw, 35vh) scale(1.1) rotate(-25deg); }
  60%  { transform: translate(30vw, 40vh) scale(1.4) rotate(15deg); }
  80%  { transform: translate(-35vw, -40vh) scale(1.2) rotate(-10deg); }
  100% { transform: translate(0,0) scale(1.2); }
}

/* Mobile sizing */
@media (max-width: 600px) {
  #cd {
    width: 180px;
  }
}
</style>
</head>

<body>

<div class="cd-wrap">
  <img id="cd" src="cd.gif" alt="CD Button">
</div>

<audio id="bgAudio" src="beach.wav" loop></audio>

<script>
const cd = document.getElementById("cd");
const audio = document.getElementById("bgAudio");

// Redirect
cd.addEventListener("click", () => {
  window.location.href = "#";
});

// Start audio
document.addEventListener("click", () => {
  audio.play();
  scheduleGlitch();
}, { once: true });

/* GLITCH AUDIO (HIGH PITCH STUTTER) */
function glitchAudio() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const source = ctx.createMediaElementSource(audio);

  const delay = ctx.createDelay();
  const gain = ctx.createGain();

  delay.delayTime.value = 0.02;
  gain.gain.value = 0.9;

  source.connect(delay);
  delay.connect(gain);
  gain.connect(ctx.destination);
  source.connect(ctx.destination);

  // increase pitch
  audio.playbackRate = 1.8;

  let interval = setInterval(() => {
    delay.delayTime.value = Math.random() * 0.03;
  }, 25);

  // trigger visual chaos
  cd.classList.add("glitching");

  setTimeout(() => {
    clearInterval(interval);
    delay.disconnect();
    gain.disconnect();

    audio.playbackRate = 1; // reset pitch
    cd.classList.remove("glitching");
  }, 1200 + Math.random() * 800); // 1–2 sec
}

/* Random 30–60 sec */
function scheduleGlitch() {
  let time = Math.random() * (60000 - 30000) + 30000;

  setTimeout(() => {
    glitchAudio();
    scheduleGlitch();
  }, time);
}
</script>

</body>
</html>
