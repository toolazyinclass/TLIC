<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Too Lazy, In Class</title>
<meta name="description" content="Bored in class? Click here!">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

/* BACKGROUND */
.background {
    position: fixed;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -2;
}

/* LOGO */
.logo-container {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    pointer-events: none;
}

.logo {
    width: 1100px;
}

/* OBJECTS */
.object {
    position: absolute;
    cursor: pointer;
    z-index: 2;
    transition: transform 0.2s ease-out;
}

/* FLOAT + TILT */
.float-wrapper {
    position: absolute;
    animation: floatTilt 5s ease-in-out infinite;
}

@keyframes floatTilt {
    0%   { transform: translateY(0px) rotate(-3deg); }
    25%  { transform: translateY(-18px) rotate(2deg); }
    50%  { transform: translateY(-10px) rotate(0deg); }
    75%  { transform: translateY(-18px) rotate(-2deg); }
    100% { transform: translateY(0px) rotate(3deg); }
}

/* SIZES */
.chair { width: 250px; }
.book { width: 120px; }
.apple { width: 180px; }

/* HOVER */
.object:hover {
    animation: shake 0.05s infinite;
    transform: scale(1.15);
}

/* SHAKE */
@keyframes shake {
    0% { transform: translate(1px, 1px) scale(1.15); }
    25% { transform: translate(-2px, 2px) scale(1.15); }
    50% { transform: translate(2px, -1px) scale(1.15); }
    75% { transform: translate(-1px, -2px) scale(1.15); }
    100% { transform: translate(1px, 2px) scale(1.15); }
}

/* GLITCH */
.glitch {
    animation: glitchAnim 0.1s infinite;
}

@keyframes glitchAnim {
    0% { transform: translate(10px, -10px) skew(5deg); }
    25% { transform: translate(-15px, 5px) skew(-5deg); }
    50% { transform: translate(10px, 10px) skew(3deg); }
    75% { transform: translate(-10px, -5px) skew(-3deg); }
    100% { transform: translate(5px, 5px) skew(2deg); }
}
</style>
</head>

<body>

<img src="firststatic.gif" class="background">

<audio id="bg-audio" loop>
    <source src="radio.wav" type="audio/wav">
</audio>

<div class="logo-container" id="logoContainer">
    <img id="logo" class="logo" src="logo1.png">
</div>

<a href="page2.html" class="float-wrapper" id="appleWrap">
    <img src="apple.gif" class="object apple">
</a>

<a href="page3.html" class="float-wrapper" id="chairWrap">
    <img src="chair.gif" class="object chair">
</a>

<a href="page4.html" class="float-wrapper" id="bookWrap">
    <img src="book.gif" class="object book">
</a>

<script>
// AUDIO (click to play)
const audio = document.getElementById("bg-audio");
document.addEventListener("click", () => {
    audio.play();
});

// POSITIONS (fixed, non-random, spaced)
document.getElementById("appleWrap").style.left = "62vw";
document.getElementById("appleWrap").style.top = "70vh";

document.getElementById("chairWrap").style.left = "78vw";
document.getElementById("chairWrap").style.top = "35vh";

document.getElementById("bookWrap").style.left = "18vw";
document.getElementById("bookWrap").style.top = "65vh";

// LOGO LOOP
const logos = ["logo1.png", "logo2.png", "logo3.png"];
let currentLogo = 0;

setInterval(() => {
    currentLogo = (currentLogo + 1) % logos.length;
    document.getElementById("logo").src = logos[currentLogo];
}, 1000);

// GLITCH FUNCTION
function triggerGlitch() {
    const logoContainer = document.getElementById("logoContainer");

    logoContainer.classList.add("glitch");

    let originalTime = audio.currentTime;
    let originalRate = audio.playbackRate;
    let count = 0;

    audio.playbackRate = 0.85;

    let glitchInterval = setInterval(() => {
        audio.currentTime = originalTime;
        audio.volume = 0.6 + Math.random() * 0.4;

        count++;
        if (count > 8) clearInterval(glitchInterval);
    }, 120);

    setTimeout(() => {
        logoContainer.classList.remove("glitch");
        audio.playbackRate = originalRate;
        audio.volume = 1;

        scheduleNextGlitch();
    }, 700);
}

// RANDOM GLITCH TIMING (30s–3min)
function scheduleNextGlitch() {
    let time = (Math.random() * (180000 - 30000)) + 30000;
    setTimeout(triggerGlitch, time);
}

scheduleNextGlitch();
</script>

</body>
</html>
