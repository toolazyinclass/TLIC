<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>too lazy, in class</title>
<meta name="description" content="an artist page... make that an excellent artist page...">

<link rel="icon" href="beach.gif">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  height: 100%;
  width: 100%;
  overflow: hidden;
  background: #000;
}

/* Fixed background div — kills the mobile white-border bug */
#bg {
  position: fixed;
  inset: -20px;
  background: url("beach.gif") no-repeat center center;
  background-size: cover;
  z-index: 0;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CD */
#cd {
  width: 220px;
  max-width: 60vw;
  cursor: pointer;
  animation: float 4s ease-in-out infinite;
  position: relative;
  z-index: 1;
}

/* FLOAT */
@keyframes float {
  0%   { transform: translateY(0px); }
  50%  { transform: translateY(-18px); }
  100% { transform: translateY(0px); }
}

/* HOVER */
@media (hover: hover) {
  #cd:hover {
    animation: none;
    transform: scale(1.28);
  }
}

#cd:active {
  animation: none;
  transform: scale(1.2);
}

/* Mobile */
@media (max-width: 600px) {
  #cd {
    width: 180px;
  }
}
</style>
</head>

<body>

<div id="bg"></div>
<img id="cd" src="cd.gif" alt="CD Button">
<audio id="bgAudio" src="beach.wav" loop></audio>

<script>
const cd    = document.getElementById("cd");
const audio = document.getElementById("bgAudio");

cd.addEventListener("click", () => {
  window.location.href = "#";
});

/* first click anywhere starts audio + glitch loop */
document.addEventListener("click", () => {
  audio.play();
  startGlitchLoop();
}, { once: true });

function startGlitchLoop() {
  setInterval(triggerGlitch, 15000);
}

/* ── GLITCH ─────────────────────────────────── */
function triggerGlitch() {
  if (audio.paused) return;

  const baseTime = audio.currentTime;
  const duration = 1500;
  const tick     = 55;

  /* kill float so we have full transform control */
  cd.style.animation = "none";

  /* slow-pitch audio glitch */
  audio.playbackRate = 0.6;

  const glitch = setInterval(() => {

    /* ── position teleport ── */
    const big = Math.random() > 0.7;                       // 30 % chance of a big jump
    const range = big ? 160 : 50;
    const x = (Math.random() - 0.5) * range;
    const y = (Math.random() - 0.5) * range;

    /* ── scale jitter ── */
    let scale;
    const roll = Math.random();
    if      (roll > 0.92) scale = 1.9  + Math.random() * 0.6;   // blowup
    else if (roll > 0.82) scale = 0.25 + Math.random() * 0.25;  // shrink
    else                  scale = 0.75 + Math.random() * 0.5;    // normal jitter

    /* ── rotation + skew ── */
    const rotate = (Math.random() - 0.5) * (big ? 30 : 10);
    const skewX  = Math.random() > 0.8 ? (Math.random() - 0.5) * 20 : 0;

    /* ── opacity flicker ── */
    const opacity = Math.random() > 0.82 ? (0.15 + Math.random() * 0.35) : 1;

    /* ── filter glitch ── */
    let filter = "";
    if (Math.random() > 0.65)
      filter = `hue-rotate(${Math.random() * 360}deg) brightness(${0.4 + Math.random() * 1.8})`;
    if (Math.random() > 0.88)
      filter += ` blur(${1 + Math.random() * 2.5}px)`;
    if (Math.random() > 0.92)
      filter += ` invert(1)`;

    /* apply */
    cd.style.transform = `translate(${x}px, ${y}px) scale(${scale}) rotate(${rotate}deg) skewX(${skewX}deg)`;
    cd.style.opacity   = opacity;
    cd.style.filter    = filter;

    /* audio stutter — replay the same tiny slice */
    audio.currentTime = baseTime + Math.random() * 0.025;

  }, tick);

  /* ── cleanup ── */
  setTimeout(() => {
    clearInterval(glitch);

    cd.style.transform = "";
    cd.style.opacity   = "";
    cd.style.filter    = "";
    audio.playbackRate  = 1;

    /* restart float animation (reflow trick) */
    void cd.offsetHeight;
    cd.style.animation = "float 4s ease-in-out infinite";

  }, duration);
}
</script>

</body>
</html>
