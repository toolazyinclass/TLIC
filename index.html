<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Too Lazy, In Class</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

.background {
    position: fixed;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -2;
}

.logo-container {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
    pointer-events: none;
}

.logo {
    width: min(1100px, 80vw);
}

.safe-zone {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 900px;
    height: 500px;
    pointer-events: none;
    z-index: 4;
}

.object {
    position: absolute;
    cursor: pointer;
    z-index: 6;
}

.float-wrapper {
    position: absolute;
    animation: floatTilt 5s ease-in-out infinite;
}

@keyframes floatTilt {
    0% { transform: translateY(0px) rotate(-3deg); }
    50% { transform: translateY(-15px) rotate(2deg); }
    100% { transform: translateY(0px) rotate(3deg); }
}

.object:hover {
    animation: shake 0.05s infinite;
    transform: scale(1.15);
}

@keyframes shake {
    0% { transform: translate(1px,1px) scale(1.15); }
    50% { transform: translate(-2px,2px) scale(1.15); }
    100% { transform: translate(1px,-1px) scale(1.15); }
}
</style>
</head>

<body>

<img src="firststatic.gif" class="background">

<audio id="bg-audio" loop>
    <source src="radio.wav" type="audio/wav">
</audio>

<div class="logo-container">
    <img class="logo" src="logo1.png">
</div>

<div class="safe-zone"></div>

<!-- CLICK NAVIGATION FIX -->
<a href="page2.html" onclick="goToPage(event, 'page2.html')" class="float-wrapper" style="left:62vw; top:70vh;">
    <img src="apple.gif" class="object" style="width:180px;">
</a>

<a href="page3.html" class="float-wrapper" style="left:78vw; top:35vh;">
    <img src="chair.gif" class="object" style="width:250px;">
</a>

<a href="page4.html" class="float-wrapper" style="left:18vw; top:65vh;">
    <img src="book.gif" class="object" style="width:120px;">
</a>

<script>
const audio = document.getElementById("bg-audio");

document.addEventListener("click", () => {
    audio.play();
}, { once: true });

// SAVE + NAVIGATE
function goToPage(e, url) {
    e.preventDefault();

    localStorage.setItem("audioTime", audio.currentTime);
    localStorage.setItem("audioPlaying", "true");

    window.location.href = url;
}
</script>

</body>
</html>
