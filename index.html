<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>too lazy, in class</title>
<meta name="description" content="an artist page... make that an excellent artist page...">

<link rel="icon" href="beach.gif">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  width: 100vw;
  background: url("beach.gif") no-repeat center center fixed;
  background-size: cover;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

.cd-wrap {
  isolation: isolate;
  position: relative;
}

#cd {
  width: 220px;
  max-width: 60vw;
  cursor: pointer;
  transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
  animation: float 4s ease-in-out infinite;
}

/* Floating */
@keyframes float {
  0%   { transform: translateY(0px) rotate(0deg); }
  50%  { transform: translateY(-10px) rotate(1deg); }
  100% { transform: translateY(0px) rotate(0deg); }
}

/* Hover */
@media (hover: hover) {
  #cd:hover {
    transform: scale(1.28);
    animation: shake 0.08s infinite;
  }
}

/* Mobile */
#cd:active {
  transform: scale(1.2);
  animation: shake 0.08s infinite;
}

/* Shake */
@keyframes shake {
  0%   { transform: translate(0px, 0px) rotate(0deg) scale(1.28); }
  25%  { transform: translate(2px, -2px) rotate(1deg) scale(1.28); }
  50%  { transform: translate(-2px, 2px) rotate(-1deg) scale(1.28); }
  75%  { transform: translate(2px, 2px) rotate(1deg) scale(1.28); }
  100% { transform: translate(-2px, -2px) rotate(-1deg) scale(1.28); }
}

/* GLITCH MOVEMENT (slower + readable) */
.glitching {
  animation: chaos 0.25s ease-in-out infinite !important;
}

@keyframes chaos {
  0%   { transform: translate(0,0) scale(1.2); }
  25%  { transform: translate(25vw, -20vh) scale(1.3) rotate(10deg); }
  50%  { transform: translate(-30vw, 25vh) scale(1.15) rotate(-12deg); }
  75%  { transform: translate(20vw, 30vh) scale(1.35) rotate(8deg); }
  100% { transform: translate(0,0) scale(1.2); }
}

/* Mobile sizing */
@media (max-width: 600px) {
  #cd {
    width: 180px;
  }
}
</style>
</head>

<body>

<div class="cd-wrap">
  <img id="cd" src="cd.gif" alt="CD Button">
</div>

<audio id="bgAudio" src="beach.wav" loop></audio>

<script>
const cd = document.getElementById("cd");
const audio = document.getElementById("bgAudio");

// Redirect
cd.addEventListener("click", () => {
  window.location.href = "#";
});

// Start audio (required for mobile)
document.addEventListener("click", () => {
  audio.play();
  scheduleGlitch();
}, { once: true });

/* GLITCH AUDIO (stable + resumes properly) */
function glitchAudio() {
  if (audio.paused) return;

  // Save position
  const currentTime = audio.currentTime;

  // Apply high pitch
  audio.playbackRate = 1.6;

  // Stutter effect (without breaking playback)
  let repeats = 8;
  let count = 0;

  const stutter = setInterval(() => {
    audio.currentTime = currentTime + (Math.random() * 0.05);
    count++;
    if (count >= repeats) {
      clearInterval(stutter);
    }
  }, 60);

  // Visual glitch
  cd.classList.add("glitching");

  setTimeout(() => {
    audio.playbackRate = 1; // reset pitch cleanly
    cd.classList.remove("glitching");
  }, 1200 + Math.random() * 800); // ~1–2 sec
}

/* Random 30–60 sec */
function scheduleGlitch() {
  let time = Math.random() * (60000 - 30000) + 30000;

  setTimeout(() => {
    glitchAudio();
    scheduleGlitch();
  }, time);
}
</script>

</body>
</html>
