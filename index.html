<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Too Lazy, In Class</title>
<meta name="description" content="Bored in class? Click here!">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

/* BACKGROUND */
.background {
    position: fixed;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -2;
}

/* LOGO */
.logo-container {
    position: absolute;
    top: 10%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    pointer-events: none;
}

.logo {
    width: 900px;
}

/* OBJECTS */
.object {
    position: absolute;
    cursor: pointer;
    z-index: 2;
    transition: transform 0.2s ease-out;
}

/* FLOAT (separate wrapper to avoid conflict) */
.float-wrapper {
    position: absolute;
    animation: floatAnim 4s ease-in-out infinite;
}

@keyframes floatAnim {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
    100% { transform: translateY(0px); }
}

/* SIZES */
.chair { width: 250px; }
.book { width: 120px; }
.apple { width: 180px; }

/* HOVER (only affects inner image now) */
.object:hover {
    animation: shake 0.05s infinite;
    transform: scale(1.15);
    transition: transform 5s linear;
}

/* SHAKE */
@keyframes shake {
    0% { transform: translate(1px, 1px) scale(1.15); }
    25% { transform: translate(-2px, 2px) scale(1.15); }
    50% { transform: translate(2px, -1px) scale(1.15); }
    75% { transform: translate(-1px, -2px) scale(1.15); }
    100% { transform: translate(1px, 2px) scale(1.15); }
}

/* LOGO GLITCH */
.glitch {
    animation: glitchAnim 0.1s infinite;
}

@keyframes glitchAnim {
    0% { transform: translate(10px, -10px) skew(5deg); }
    25% { transform: translate(-15px, 5px) skew(-5deg); }
    50% { transform: translate(10px, 10px) skew(3deg); }
    75% { transform: translate(-10px, -5px) skew(-3deg); }
    100% { transform: translate(5px, 5px) skew(2deg); }
}
</style>
</head>

<body>

<!-- BACKGROUND -->
<img src="assets/images/firststatic.gif" class="background">

<!-- AUDIO -->
<audio id="bg-audio" autoplay loop>
    <source src="assets/audio/radio.wav" type="audio/wav">
</audio>

<!-- LOGO -->
<div class="logo-container" id="logoContainer">
    <img id="logo" class="logo" src="assets/images/logo1.png">
</div>

<!-- APPLE -->
<a href="page2.html" class="float-wrapper" style="top:70%; left:10%;">
    <img src="assets/images/apple.gif" class="object apple">
</a>

<!-- CHAIR -->
<a href="page3.html" class="float-wrapper" id="chairWrap">
    <img src="assets/images/chair.gif" class="object chair">
</a>

<!-- BOOK -->
<a href="page4.html" class="float-wrapper" id="bookWrap">
    <img src="assets/images/book.gif" class="object book">
</a>

<script>
// AUDIO UNLOCK
document.addEventListener("click", () => {
    document.getElementById("bg-audio").play();
});

// POSITION CHAIR
const chairWrap = document.getElementById("chairWrap");
chairWrap.style.left = "55%";
chairWrap.style.top = "65%";

// BOOK OFFSET
const bookWrap = document.getElementById("bookWrap");

function placeBook() {
    let offsetX = (Math.random() * 200) - 100;
    let offsetY = (Math.random() * 150) - 75;

    bookWrap.style.left = `calc(55% + ${offsetX}px)`;
    bookWrap.style.top = `calc(65% + ${offsetY}px)`;
}
placeBook();

// LOGO LOOP
const logos = [
    "assets/images/logo1.png",
    "assets/images/logo2.png",
    "assets/images/logo3.png"
];

let currentLogo = 0;
const logoEl = document.getElementById("logo");

setInterval(() => {
    currentLogo = (currentLogo + 1) % logos.length;
    logoEl.src = logos[currentLogo];
}, 1000);

// GLITCH FUNCTION
function triggerGlitch() {
    const logoContainer = document.getElementById("logoContainer");
    const audio = document.getElementById("bg-audio");

    const positions = [
        "top:0; left:0;",
        "top:0; right:0;",
        "bottom:0; left:0;",
        "bottom:0; right:0;"
    ];

    logoContainer.style = "position:absolute;" + positions[Math.floor(Math.random()*4)];
    logoContainer.classList.add("glitch");

    // AUDIO STUTTER
    let currentTime = audio.currentTime;
    let count = 0;

    let glitchInterval = setInterval(() => {
        audio.currentTime = currentTime;
        count++;
        if (count > 6) clearInterval(glitchInterval);
    }, 200);

    setTimeout(() => {
        logoContainer.classList.remove("glitch");
        logoContainer.style = "top:10%; left:50%; transform:translateX(-50%);";

        scheduleNextGlitch();
    }, 500);
}

// RANDOM GLITCH TIMER (3–6 min)
function scheduleNextGlitch() {
    let randomTime = (Math.random() * (360000 - 180000)) + 180000;
    setTimeout(triggerGlitch, randomTime);
}

scheduleNextGlitch();
</script>

</body>
</html>
