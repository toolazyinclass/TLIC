<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Too Lazy, In Class</title>
<meta name="description" content="Bored in class? Click here!">

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

/* BACKGROUND */
.background {
    position: fixed;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -2;
}

/* LOGO */
.logo-container {
    position: absolute;
    top: 42%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 5;
    pointer-events: none;
}

.logo {
    width: 1100px;
}

/* OBJECTS */
.object {
    position: absolute;
    cursor: pointer;
    z-index: 2;
    transition: transform 8s linear;
}

/* FLOAT */
.float-wrapper {
    position: absolute;
    animation: floatAnim 4s ease-in-out infinite;
}

@keyframes floatAnim {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-18px); }
    100% { transform: translateY(0px); }
}

/* SIZES */
.chair { width: 250px; }
.book { width: 120px; }
.apple { width: 180px; }

/* HOVER */
.object:hover {
    animation: shake 0.05s infinite;
    transform: scale(1.15);
}

/* SHAKE */
@keyframes shake {
    0% { transform: translate(1px, 1px) scale(1.15); }
    25% { transform: translate(-2px, 2px) scale(1.15); }
    50% { transform: translate(2px, -1px) scale(1.15); }
    75% { transform: translate(-1px, -2px) scale(1.15); }
    100% { transform: translate(1px, 2px) scale(1.15); }
}

/* GLITCH */
.glitch {
    animation: glitchAnim 0.1s infinite;
}

@keyframes glitchAnim {
    0% { transform: translate(10px, -10px) skew(5deg); }
    25% { transform: translate(-15px, 5px) skew(-5deg); }
    50% { transform: translate(10px, 10px) skew(3deg); }
    75% { transform: translate(-10px, -5px) skew(-3deg); }
    100% { transform: translate(5px, 5px) skew(2deg); }
}
</style>
</head>

<body>

<img src="firststatic.gif" class="background">

<audio id="bg-audio" autoplay loop muted>
    <source src="radio.wav" type="audio/wav">
</audio>

<div class="logo-container" id="logoContainer">
    <img id="logo" class="logo" src="logo1.png">
</div>

<a href="page2.html" class="float-wrapper" id="appleWrap">
    <img src="apple.gif" class="object apple">
</a>

<a href="page3.html" class="float-wrapper" id="chairWrap">
    <img src="chair.gif" class="object chair">
</a>

<a href="page4.html" class="float-wrapper" id="bookWrap">
    <img src="book.gif" class="object book">
</a>

<script>
const audio = document.getElementById("bg-audio");

// Always attempt play
audio.volume = 0;
audio.play().catch(() => {});

// Check if user already interacted before (across pages)
let hasPlayed = sessionStorage.getItem("audioPlayed");

// FIRST TIME → fade in
if (!hasPlayed) {
    document.addEventListener("click", () => {
        audio.muted = false;

        let vol = 0;
        const fade = setInterval(() => {
            vol += 0.05;
            if (vol >= 1) {
                vol = 1;
                clearInterval(fade);
            }
            audio.volume = vol;
        }, 150); // ~3 seconds total

        sessionStorage.setItem("audioPlayed", "true");
    }, { once: true });

} else {
    // NEXT PAGES → instant full volume
    audio.muted = false;
    audio.volume = 1;
}

// OBJECT REFERENCES
const objects = {
    apple: document.getElementById("appleWrap"),
    chair: document.getElementById("chairWrap"),
    book: document.getElementById("bookWrap")
};

// FIXED POSITIONS
objects.apple.style.left = "62vw";
objects.apple.style.top = "70vh";

objects.chair.style.left = "78vw";
objects.chair.style.top = "35vh";

objects.book.style.left = "18vw";
objects.book.style.top = "65vh";

// ROTATION
document.querySelector("#appleWrap .object").style.transform += " rotate(-6deg)";
document.querySelector("#chairWrap .object").style.transform += " rotate(5deg)";
document.querySelector("#bookWrap .object").style.transform += " rotate(-3deg)";

// LOGO LOOP
const logos = ["logo1.png", "logo2.png", "logo3.png"];
let currentLogo = 0;

setInterval(() => {
    currentLogo = (currentLogo + 1) % logos.length;
    document.getElementById("logo").src = logos[currentLogo];
}, 1000);

// GLITCH
function triggerGlitch() {
    const logoContainer = document.getElementById("logoContainer");

    logoContainer.classList.add("glitch");

    setTimeout(() => {
        logoContainer.classList.remove("glitch");
        scheduleNextGlitch();
    }, 500);
}

function scheduleNextGlitch() {
    let t = (Math.random() * (360000 - 180000)) + 180000;
    setTimeout(triggerGlitch, t);
}

scheduleNextGlitch();
</script>

</body>
</html>
