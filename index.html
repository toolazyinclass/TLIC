<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>too lazy, in class</title>
<meta name="description" content="an artist page... make that an excellent artist page...">

<link rel="icon" href="beach.gif">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  height: 100vh;
  width: 100vw;
  background: url("beach.gif") no-repeat center center fixed;
  background-size: cover;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CD */
#cd {
  width: 220px;
  max-width: 60vw;
  cursor: pointer;
  transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
  animation: float 4s ease-in-out infinite;
}

/* FLOAT */
@keyframes float {
  0%   { transform: translateY(0px); }
  50%  { transform: translateY(-18px); }
  100% { transform: translateY(0px); }
}

/* HOVER */
@media (hover: hover) {
  #cd:hover {
    animation: none;
    transform: scale(1.28);
  }
}

#cd:active {
  animation: none;
  transform: scale(1.2);
}

/* Mobile */
@media (max-width: 600px) {
  #cd {
    width: 180px;
  }
}
</style>
</head>

<body>

<img id="cd" src="cd.gif" alt="CD Button">
<audio id="bgAudio" src="beach.wav" loop></audio>

<script>
const cd = document.getElementById("cd");
const audio = document.getElementById("bgAudio");

cd.addEventListener("click", () => {
  window.location.href = "#";
});

/* Start audio */
document.addEventListener("click", () => {
  audio.play();
  startGlitchLoop();
}, { once: true });

/* Loop every 15s */
function startGlitchLoop() {
  setInterval(triggerGlitch, 15000);
}

/* CLEAN GLITCH SYSTEM */
function triggerGlitch() {
  if (audio.paused) return;

  const baseTime = audio.currentTime;

  // low pitch glitch
  audio.playbackRate = 0.6;

  let duration = 1500; // glitch duration
  let intervalTime = 70;

  const glitchInterval = setInterval(() => {
    // small random offsets near center
    let x = (Math.random() - 0.5) * 30;
    let y = (Math.random() - 0.5) * 30;

    // size jitter
    let scale = 0.85 + Math.random() * 0.4;

    cd.style.transform = `translate(${x}px, ${y}px) scale(${scale})`;

    // audio stutter (same slice)
    audio.currentTime = baseTime + (Math.random() * 0.025);

  }, intervalTime);

  setTimeout(() => {
    clearInterval(glitchInterval);

    // reset visuals cleanly
    cd.style.transform = "";
    audio.playbackRate = 1;

  }, duration);
}
</script>

</body>
</html>
