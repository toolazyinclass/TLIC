<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>too lazy, in class</title>
<meta name="description" content="an artist page... make that an excellent artist page...">

<link rel="icon" href="beach.gif">

<style>
/* Reset */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Background */
body {
  height: 100vh;
  width: 100vw;
  background: url("beach.gif") no-repeat center center fixed;
  background-size: cover;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* CD */
#cd {
  width: 220px;
  max-width: 60vw;
  transition: transform 0.2s ease;
  cursor: pointer;
}

/* Hover (desktop) */
@media (hover: hover) {
  #cd:hover {
    transform: scale(1.3);
    animation: shake 0.05s infinite;
  }
}

/* Tap (mobile fallback) */
#cd:active {
  transform: scale(1.2);
  animation: shake 0.05s infinite;
}

/* Shake animation */
@keyframes shake {
  0% { transform: translate(0px, 0px) rotate(0deg) scale(1.3); }
  25% { transform: translate(2px, -2px) rotate(1deg) scale(1.3); }
  50% { transform: translate(-2px, 2px) rotate(-1deg) scale(1.3); }
  75% { transform: translate(2px, 2px) rotate(1deg) scale(1.3); }
  100% { transform: translate(-2px, -2px) rotate(-1deg) scale(1.3); }
}

/* Mobile adjustments */
@media (max-width: 600px) {
  #cd {
    width: 180px;
  }
}
</style>
</head>

<body>

<img id="cd" src="cd.gif" alt="CD Button">

<audio id="bgAudio" src="beach.wav" loop></audio>

<script>
const cd = document.getElementById("cd");
const audio = document.getElementById("bgAudio");

// Click redirect (change later)
cd.addEventListener("click", () => {
  window.location.href = "#";
});

// --- AUDIO START (required for mobile autoplay rules) ---
document.addEventListener("click", () => {
  audio.play();
  scheduleGlitch();
}, { once: true });

// --- GLITCH EFFECT ---
function glitchAudio() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const source = ctx.createMediaElementSource(audio);

  const delay = ctx.createDelay();
  const gain = ctx.createGain();

  delay.delayTime.value = 0.04;
  gain.gain.value = 0.7;

  source.connect(delay);
  delay.connect(gain);
  gain.connect(ctx.destination);
  source.connect(ctx.destination);

  let repeats = Math.floor(Math.random() * 6) + 3;

  let interval = setInterval(() => {
    delay.delayTime.value = Math.random() * 0.08;
  }, 40);

  setTimeout(() => {
    clearInterval(interval);
    delay.disconnect();
    gain.disconnect();
  }, repeats * 100);
}

// Random glitch every 30–90 sec
function scheduleGlitch() {
  let time = Math.random() * (90000 - 30000) + 30000;

  setTimeout(() => {
    glitchAudio();
    scheduleGlitch();
  }, time);
}
</script>

</body>
</html>
