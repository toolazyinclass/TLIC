<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Page 2</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: black;
}

.background {
    position: fixed;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: -2;
}

.eye {
    position: absolute;
    width: 160px;
    cursor: pointer;
    z-index: 3;
}

.wrapper {
    position: absolute;
    animation: floatTilt 5s ease-in-out infinite;
}

@keyframes floatTilt {
    0% { transform: translateY(0px) rotate(-3deg); }
    50% { transform: translateY(-15px) rotate(2deg); }
    100% { transform: translateY(0px) rotate(3deg); }
}

.eye:hover {
    animation: shake 0.05s infinite;
    transform: scale(1.15);
}

@keyframes shake {
    0% { transform: translate(1px,1px) scale(1.15); }
    50% { transform: translate(-2px,2px) scale(1.15); }
    100% { transform: translate(1px,-1px) scale(1.15); }
}
</style>
</head>

<body>

<img src="background2.gif" class="background">

<audio id="bg-audio" loop>
    <source src="song2.wav" type="audio/wav">
</audio>

<div id="container"></div>

<script>
const audio = document.getElementById("bg-audio");

// RESTORE + PLAY (works because navigation click unlocked it)
let savedTime = localStorage.getItem("audioTime");

if (savedTime) {
    audio.currentTime = parseFloat(savedTime);
}

audio.play().catch(() => {});

// RANDOM EYES (saved once)
let saved = localStorage.getItem("eyePositions");
let data;

if (saved) {
    data = JSON.parse(saved);
} else {
    data = [];
    let count = Math.floor(Math.random() * 4) + 7;

    for (let i = 0; i < count; i++) {
        data.push({
            x: Math.random() * 90,
            y: Math.random() * 90,
            type: Math.random() > 0.5 ? "eye1.gif" : "eye2.gif"
        });
    }

    localStorage.setItem("eyePositions", JSON.stringify(data));
}

const container = document.getElementById("container");

data.forEach((eye) => {
    let wrap = document.createElement("div");
    wrap.className = "wrapper";
    wrap.style.left = eye.x + "vw";
    wrap.style.top = eye.y + "vh";

    let img = document.createElement("img");
    img.src = eye.type;
    img.className = "eye";

    wrap.appendChild(img);
    container.appendChild(wrap);
});
</script>

</body>
</html>
